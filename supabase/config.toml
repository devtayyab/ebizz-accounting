# Supabase local development config. See https://supabase.com/docs/guides/cli/config
project_id = "ebizz-accounting"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

# NOTE: this file configures the LOCAL dev stack. Production auth is configured
# in the Supabase dashboard (see docs/PRODUCTION.md):
#   • Authentication → URL Configuration: set Site URL + Redirect URLs to your
#     web domain (e.g. https://app.yourdomain.com).
#   • Authentication → Providers → Email: turn "Confirm email" ON in production.
[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Local: OFF for fast testing (confirmation emails are still captured in Mailpit
# at http://localhost:54324 if you flip this on). Production: turn ON in the dashboard.
enable_confirmations = false

[storage]
enabled = true
